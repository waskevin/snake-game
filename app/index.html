<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake Game</title>
    <link rel="stylesheet" href="./snake.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="copy">
          <p class="eyebrow">TOS 7 Demo App</p>
          <h1>贪吃蛇</h1>
          <p class="intro">
            用方向键或屏幕按钮操控小蛇，吃掉果实、刷新分数，并在浏览器里直接开始一局。
          </p>
        </div>
        <div class="stats">
          <div class="card">
            <span>当前分数</span>
            <strong id="score">0</strong>
          </div>
          <div class="card">
            <span>历史最高</span>
            <strong id="best">0</strong>
          </div>
          <div class="card">
            <span>当前速度</span>
            <strong id="speed">1x</strong>
          </div>
        </div>
      </section>

      <section class="board-wrap">
        <canvas id="board" width="480" height="480" aria-label="Snake game board"></canvas>
        <aside class="panel">
          <button id="startBtn" class="primary" type="button">开始 / 重新开始</button>
          <button id="pauseBtn" class="secondary" type="button">暂停</button>
          <p id="status" class="status">按开始按钮进入游戏</p>
          <div class="controls">
            <button data-dir="up" type="button">↑</button>
            <div class="row">
              <button data-dir="left" type="button">←</button>
              <button data-dir="down" type="button">↓</button>
              <button data-dir="right" type="button">→</button>
            </div>
          </div>
          <ul class="tips">
            <li>方向键控制移动。</li>
            <li>每吃到 3 个果实会略微加速。</li>
            <li>撞墙或撞到自己会结束游戏。</li>
          </ul>
        </aside>
      </section>
    </main>

    <script src="./snake.js"></script>
  </body>
  </html>
